version: '3.8'

# ============================================================
# IMPORTANTE: Antes de levantar este compose crea el .env
# copiando .env.example y completando los valores.
# ============================================================

services:

  # ----------------------------------------------------------
  # Infraestructura compartida
  # ----------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: sanosysalvos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanosysalvos
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d sanosysalvos"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sanosysalvos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Microservicios
  # ----------------------------------------------------------

  auth-service:
    image: ${DOCKERHUB_USERNAME}/sanosysalvos-auth-service:latest
    container_name: sanosysalvos-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sanosysalvos
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  report-service:
    image: ${DOCKERHUB_USERNAME}/sanosysalvos-reporte-service:latest
    container_name: sanosysalvos-report-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanosysalvos
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  geolocation-service:
    image: ${DOCKERHUB_USERNAME}/sanosysalvos-geolocation-service:latest
    container_name: sanosysalvos-geolocation-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      GEO_DB_URL: jdbc:postgresql://postgres:5432/sanosysalvos
      GEO_DB_USER: ${DB_USER}
      GEO_DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  matching-service:
    image: ${DOCKERHUB_USERNAME}/sanosysalvos-matching-service:latest
    container_name: sanosysalvos-matching-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      MATCHING_DB_URL: jdbc:postgresql://postgres:5432/sanosysalvos
      MATCHING_DB_USER: ${DB_USER}
      MATCHING_DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      GEOLOCATION_SERVICE_URL: http://geolocation-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      geolocation-service:
        condition: service_started

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/sanosysalvos-api-gateway:latest
    container_name: sanosysalvos-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8081
      REPORTE_SERVICE_URL: http://report-service:8083
      GEO_SERVICE_URL: http://geolocation-service:8084
      MATCH_SERVICE_URL: http://matching-service:8085
    depends_on:
      - auth-service
      - report-service
      - geolocation-service
      - matching-service

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  default:
    name: sanosysalvos-network